name: Apartment Search

on:
  schedule:
    # Twice daily: 08:00 and 20:00 Israel time (UTC+2 winter / UTC+3 summer)
    # We schedule at 06:00 and 18:00 UTC which is 08:00/20:00 winter, 09:00/21:00 summer
    - cron: '0 6,18 * * *'
  workflow_dispatch:  # allow manual trigger

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit seen_listings.json back

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run apartment search
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python main.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_listings.json
          git diff --quiet --cached || git commit -m "chore: update seen listings [skip ci]"
          git push
